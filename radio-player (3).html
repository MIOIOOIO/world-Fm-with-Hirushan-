<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hirushan Live English Songs FM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-top: #2b2b30;
    --bg-bottom: #0e0e10;
    --card: rgba(255,255,255,0.06);
    --text: #ffffff;
    --sub: rgba(255,255,255,0.55);
    --ios-blue: #0a84ff;
    --track: rgba(255,255,255,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    background: linear-gradient(-45deg, #16161d, #241a2e, #1a1f2e, #14131a, #22182a);
    background-size: 400% 400%;
    animation: gradientShift 22s ease infinite;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    pointer-events: none;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  body.party {
    background: linear-gradient(-45deg, #ff2d78, #7b2fff, #00d4ff, #ff9f0a, #ff2d78);
    background-size: 400% 400%;
    animation: gradientShift 3.5s ease infinite;
  }
  body.party::before {
    background: rgba(0,0,0,0.12);
    transition: background 0.4s ease;
  }
  body::before {
    transition: background 0.4s ease;
  }

  .phone {
    width: 100%;
    max-width: 375px;
    padding: 28px 24px 34px;
    position: relative;
    z-index: 1;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 30px;
    opacity: 0.9;
  }

  .chevron {
    text-align: center;
    font-size: 0.75rem;
    color: var(--sub);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .artwork {
    width: 260px;
    height: 260px;
    margin: 0 auto 28px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease;
  }
  .artwork.playing { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }
  .artwork img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .track-info {
    text-align: center;
    margin-bottom: 22px;
  }
  .track-title {
    font-family: 'Metal Mania', cursive;
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: 1px;
    margin-bottom: 5px;
    text-shadow: 0 0 12px rgba(255,45,45,0.5);
  }
  .track-artist {
    font-size: 1rem;
    color: var(--sub);
    font-weight: 500;
  }

  .scrub {
    width: 100%;
    margin-bottom: 6px;
  }
  .scrub-track {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--track);
    position: relative;
    overflow: hidden;
  }
  .scrub-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: #fff;
    border-radius: 2px;
  }
  .scrub-fill.live { width: 100%; background: #ff453a; }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--sub);
    font-variant-numeric: tabular-nums;
    margin-bottom: 34px;
  }

  .transport {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 46px;
    margin-bottom: 40px;
  }
  .transport button {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    opacity: 0.95;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .transport button:active { transform: scale(0.88); opacity: 0.6; }
  .transport svg { width: 100%; height: 100%; }
  .btn-skip { width: 22px; height: 22px; opacity: 0.35; pointer-events: none; }
  .btn-play { width: 56px; height: 56px; }

  .volume-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .volume-row svg { width: 18px; height: 18px; color: var(--sub); flex-shrink: 0; }
  .volume-row svg.big { width: 22px; height: 22px; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--track);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    cursor: pointer;
    margin-top: 0;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
  }

  .status-pill {
    display: block;
    text-align: center;
    margin-top: 26px;
    font-size: 0.75rem;
    color: var(--sub);
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .status-pill.live { color: #ff453a; }
  .status-pill.live::before {
    content: "● ";
  }

  .party-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .party-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }
  .party-label svg { width: 18px; height: 18px; color: #ffb800; }

  .switch {
    position: relative;
    width: 51px;
    height: 31px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track {
    position: absolute;
    inset: 0;
    background: rgba(120,120,128,0.32);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.25s ease;
  }
  .switch-track::before {
    content: "";
    position: absolute;
    width: 27px;
    height: 27px;
    left: 2px;
    top: 2px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 3px 8px rgba(0,0,0,0.35);
    transition: transform 0.25s ease;
  }
  .switch input:checked + .switch-track {
    background: #34c759;
  }
  .switch input:checked + .switch-track::before {
    transform: translateX(20px);
  }

  .yt-section {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .yt-heading {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--sub);
    margin-bottom: 12px;
    text-align: center;
  }
  .yt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.92rem;
    font-weight: 600;
    transition: background 0.15s ease, transform 0.12s ease;
  }
  .yt-btn:last-child { margin-bottom: 0; }
  .yt-btn:hover { background: rgba(255,255,255,0.1); }
  .yt-btn:active { transform: scale(0.98); }
  .yt-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    border-radius: 8px;
    background: #ff0000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .yt-icon svg { width: 18px; height: 18px; color: #fff; }
  .yt-text {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .yt-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .yt-sub {
    font-size: 0.72rem;
    color: var(--sub);
    font-weight: 500;
  }
</style>
</head>

    <source src="https://beamadult.streeemer.com/listen/beamadult/radio.aac" type="audio/aac">
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const artwork = document.getElementById('artwork');
    const status = document.getElementById('status');
    const volume = document.getElementById('volume');
    const scrubFill = document.getElementById('scrubFill');
    const partyToggle = document.getElementById('partyToggle');

    partyToggle.addEventListener('change', () => {
      document.body.classList.toggle('party', partyToggle.checked);
    });

    const PLAY_PATH = "M8 5v14l11-7z";
    const PAUSE_PATH = "M6 5h4v14H6zM14 5h4v14h-4z";

    audio.volume = volume.value;

    function setPlayingUI(isPlaying) {
      playIcon.querySelector('path')?.remove();
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", isPlaying ? PAUSE_PATH : PLAY_PATH);
      playIcon.appendChild(path);
      artwork.classList.toggle('playing', isPlaying);
      scrubFill.classList.toggle('live', isPlaying);
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        status.textContent = 'Connecting...';
        status.classList.remove('live');
        audio.play().then(() => {
          setPlayingUI(true);
          status.textContent = 'Live';
          status.classList.add('live');
        }).catch(() => {
          status.textContent = 'Unable to connect to stream';
        });
      } else {
        audio.pause();
        setPlayingUI(false);
        status.textContent = 'Paused';
        status.classList.remove('live');
      }
    });

    volume.addEventListener('input', () => {
      audio.volume = volume.value;
    });

    audio.addEventListener('waiting', () => {
      status.textContent = 'Buffering...';
    });

    audio.addEventListener('error', () => {
      status.textContent = 'Stream error — please try again';
      setPlayingUI(false);
    });

    audio.addEventListener('stalled', () => {
      status.textContent = 'Connection stalled...';
    });
  </script>
