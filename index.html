<style>
  :root {
    --bg-top: #ffffff;
    --bg-bottom: #eeeeee;
    --card: rgba(0,0,0,0.04);
    --text: #111111;
    --sub: rgba(0,0,0,0.55);
    --accent: #111111;
    --track: rgba(0,0,0,0.18);
    --c1: #e8e8e8;
    --c2: #dadada;
    --c3: #f2f2f2;
    --c4: #cfcfcf;
    --c5: #e8e8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    background: linear-gradient(-45deg, #ffffff, #f3f3f3, #e9e9e9, #f7f7f7, #ececec);
    background-size: 400% 400%;
    animation: gradientShift 26s ease infinite;
    position: relative;
    overflow-x: hidden;
    overflow-y: auto;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 0.4s ease;
    z-index: 0;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  body.party {
    background: linear-gradient(-45deg, var(--c1), var(--c2), var(--c3), var(--c4), var(--c5));
    background-size: 400% 400%;
    animation: gradientShift 4s ease infinite;
    transition: background 0.6s ease;
  }
  body.party::before {
    background: rgba(255,255,255,0.45);
    transition: background 0.4s ease;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: #ffffff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease;
    z-index: 0;
  }
  body.beat::after { opacity: 0.25; }

  .phone {
    width: 100%;
    max-width: 375px;
    padding: 28px 24px 34px;
    position: relative;
    z-index: 1;
    transition: max-width 0.3s ease, padding 0.3s ease;
    margin: 24px 0;
  }

  body.desktop-view .phone {
    max-width: 720px;
    padding: 44px 48px;
    display: grid;
    grid-template-columns: 300px 1fr;
    column-gap: 44px;
    row-gap: 18px;
    align-items: start;
    grid-template-areas:
      "header header"
      "art track"
      "art scrub"
      "art transport"
      "art volume"
      "art status"
      "art views"
      "comments yt";
  }
  body.desktop-view .header-row { grid-area: header; margin-bottom: 6px; }
  body.desktop-view .artwork { grid-area: art; width: 100%; height: auto; aspect-ratio: 1 / 1; margin: 0; }
  body.desktop-view .track-info { grid-area: track; text-align: left; margin-bottom: 4px; }
  body.desktop-view .scrub { grid-area: scrub; margin-bottom: 4px; }
  body.desktop-view .transport { grid-area: transport; justify-content: flex-start; gap: 32px; margin-bottom: 12px; }
  body.desktop-view .volume-row { grid-area: volume; margin-bottom: 4px; }
  body.desktop-view .status-pill { grid-area: status; text-align: left; margin-top: 0; }
  body.desktop-view .streams-count { grid-area: views; justify-content: flex-start; margin-top: 0; }
  body.desktop-view .yt-section { grid-area: yt; }
  body.desktop-view .comments-section { grid-area: comments; margin-top: 0; padding-top: 0; border-top: none; }
  body.desktop-view .sponsor-tag { grid-column: 1 / -1; }
  body.desktop-view .ad-banner { grid-column: 1 / -1; }

  .view-switch {
    display: flex;
    flex-shrink: 0;
    background: rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 999px;
    padding: 2px;
    gap: 2px;
  }
  .view-switch button {
    border: none;
    background: transparent;
    color: var(--sub);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .view-switch button svg { width: 12px; height: 12px; }
  .view-switch button.active {
    background: var(--accent);
    color: #fff;
  }

  .chevron {
    text-align: center;
    font-size: 0.75rem;
    color: var(--sub);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 24px;
    flex: 1;
    min-width: 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 24px;
  }
  .header-row .chevron { margin-bottom: 0; }
  .header-row-spacer {
    width: 0;
    flex-shrink: 0;
  }
  @media (min-width: 340px) {
    .header-row-spacer { width: 96px; }
  }

  .artwork {
    width: 260px;
    height: 260px;
    margin: 0 auto 28px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease;
  }
  .artwork.playing { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }
  .artwork img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .artwork img.active { opacity: 1; }

  .wave-bars {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 46px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 3px;
    padding: 0 14px 8px;
    z-index: 2;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.55));
  }
  .wave-bars span {
    width: 4px;
    border-radius: 2px;
    background: #fff;
    height: 6px;
    opacity: 0.85;
    transform-origin: bottom;
  }
  .artwork.playing .wave-bars span {
    animation: waveBounce 1s ease-in-out infinite;
  }
  .wave-bars span:nth-child(1) { animation-delay: -0.9s; }
  .wave-bars span:nth-child(2) { animation-delay: -0.6s; }
  .wave-bars span:nth-child(3) { animation-delay: -1.1s; }
  .wave-bars span:nth-child(4) { animation-delay: -0.3s; }
  .wave-bars span:nth-child(5) { animation-delay: -0.8s; }
  .wave-bars span:nth-child(6) { animation-delay: -0.15s; }
  .wave-bars span:nth-child(7) { animation-delay: -1s; }
  .wave-bars span:nth-child(8) { animation-delay: -0.45s; }
  .wave-bars span:nth-child(9) { animation-delay: -0.7s; }
  .wave-bars span:nth-child(10) { animation-delay: -0.25s; }
  @keyframes waveBounce {
    0%, 100% { height: 6px; }
    50% { height: 34px; }
  }

  .track-info {
    text-align: center;
    margin-bottom: 22px;
  }
  .track-title {
    font-family: 'Inter', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.3px;
    margin-bottom: 5px;
  }
  .track-artist {
    font-size: 1rem;
    color: var(--sub);
    font-weight: 500;
  }

  .scrub {
    width: 100%;
    margin-bottom: 6px;
  }
  .scrub-track {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--track);
    position: relative;
    overflow: hidden;
  }
  .scrub-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: #fff;
    border-radius: 2px;
  }
  .scrub-fill.live { width: 100%; background: #111111; }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--sub);
    font-variant-numeric: tabular-nums;
    margin-bottom: 34px;
  }

  .transport {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 46px;
    margin-bottom: 40px;
  }
  .transport button {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    opacity: 0.95;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .transport button:active { transform: scale(0.88); opacity: 0.6; }
  .transport svg { width: 100%; height: 100%; }
  .btn-skip { width: 22px; height: 22px; opacity: 0.35; pointer-events: none; }
  .btn-play { width: 56px; height: 56px; }
  .btn-play:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }

  .volume-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .volume-row svg { width: 18px; height: 18px; color: var(--sub); flex-shrink: 0; }
  .volume-row svg.big { width: 22px; height: 22px; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--track);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    cursor: pointer;
    margin-top: 0;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
  }

  .status-pill {
    display: block;
    text-align: center;
    margin-top: 26px;
    font-size: 0.75rem;
    color: var(--sub);
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .status-pill.live { color: #111111; }
  .status-pill.live::before {
    content: "\25CF ";
  }

  .streams-count {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--sub);
  }
  .streams-count svg {
    width: 14px;
    height: 14px;
    color: var(--accent);
  }
  .streams-count .count-number {
    color: var(--text);
    font-variant-numeric: tabular-nums;
    transition: color 0.3s ease;
  }
  .streams-count .count-number.bump {
    color: var(--accent);
  }

  .yt-section {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid rgba(0,0,0,0.1);
    position: relative;
  }
  .yt-click-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    animation: hintBounce 1.6s ease-in-out infinite;
  }
  .yt-click-hint svg { width: 16px; height: 16px; }
  @keyframes hintBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }
  .yt-heading {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--sub);
    margin-bottom: 12px;
    text-align: center;
  }
  .yt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 10px;
    background: rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 14px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.92rem;
    font-weight: 600;
    transition: background 0.15s ease, transform 0.12s ease;
  }
  .yt-btn:last-child { margin-bottom: 0; }
  .yt-btn:hover { background: rgba(0,0,0,0.1); }
  .yt-btn:active { transform: scale(0.98); }
  .yt-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    border-radius: 8px;
    background: #ff0000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .yt-icon svg { width: 18px; height: 18px; color: #fff; }
  .yt-text {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .yt-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .yt-sub {
    font-size: 0.72rem;
    color: var(--sub);
    font-weight: 500;
  }

  .comments-section {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(0,0,0,0.1);
  }
  .comments-heading {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--sub);
    margin-bottom: 12px;
  }
  .comments-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .comments-form input,
  .comments-form textarea {
    width: 100%;
    background: rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.14);
    border-radius: 12px;
    padding: 11px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .comments-form input::placeholder,
  .comments-form textarea::placeholder {
    color: var(--sub);
  }
  .comments-form input:focus,
  .comments-form textarea:focus {
    border-color: var(--accent);
    background: rgba(0,0,0,0.09);
  }
  .comments-form textarea {
    min-height: 92px;
    resize: vertical;
  }
  .comments-submit {
    align-self: flex-start;
    padding: 10px 22px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.12s ease;
  }
  .comments-submit:hover { background: #333333; }
  .comments-submit:active { transform: scale(0.97); }
  .comments-note {
    font-size: 0.74rem;
    color: var(--sub);
    margin-top: 8px;
  }
  .comments-note.success { color: #111111; }

  .ad-banner {
    margin-top: 22px;
    padding: 14px 16px;
    border: 1px dashed rgba(0,0,0,0.22);
    border-radius: 12px;
    text-align: center;
    font-size: 0.72rem;
    color: var(--sub);
    letter-spacing: 0.2px;
  }
  .ad-banner strong {
    color: var(--text);
    font-weight: 700;
  }

  .sponsor-tag {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid rgba(0,0,0,0.08);
    font-size: 0.68rem;
    color: var(--sub);
  }
  .sponsor-tag img {
    height: 20px;
    width: auto;
    opacity: 0.9;
  }
</style>
</head>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const artwork = document.getElementById('artwork');
    const status = document.getElementById('status');
    const volume = document.getElementById('volume');
    const scrubFill = document.getElementById('scrubFill');
    const mobileViewBtn = document.getElementById('mobileViewBtn');
    const desktopViewBtn = document.getElementById('desktopViewBtn');
    const streamsCountEl = document.getElementById('streamsCount');

    // ---- Beat-synced RGB lighting engine ----
    let beatRAF = null;
    let beatFallbackTimer = null;
    let audioCtx = null;
    let analyser = null;
    let freqData = null;
    let energyHistory = [];
    let lastBeatTime = 0;

    function setGradientColors(hueBase) {
      const root = document.documentElement.style;
      const spread = 40;
      root.setProperty('--c1', `hsl(${(hueBase) % 360}, 85%, 60%)`);
      root.setProperty('--c2', `hsl(${(hueBase + spread) % 360}, 85%, 55%)`);
      root.setProperty('--c3', `hsl(${(hueBase + spread * 2) % 360}, 85%, 65%)`);
      root.setProperty('--c4', `hsl(${(hueBase + spread * 3) % 360}, 85%, 50%)`);
      root.setProperty('--c5', `hsl(${(hueBase + spread * 4) % 360}, 85%, 60%)`);
    }

    function triggerBeatFlash() {
      document.body.classList.add('beat');
      setTimeout(() => document.body.classList.remove('beat'), 150);
      setGradientColors(Math.floor(Math.random() * 360));
    }

    function analyseBeatFrame() {
      beatRAF = requestAnimationFrame(analyseBeatFrame);
      analyser.getByteFrequencyData(freqData);
      const bassBins = Math.floor(freqData.length * 0.12);
      let sum = 0;
      for (let i = 0; i < bassBins; i++) sum += freqData[i];
      const energy = sum / bassBins;

      energyHistory.push(energy);
      if (energyHistory.length > 40) energyHistory.shift();
      const avg = energyHistory.reduce((a, b) => a + b, 0) / energyHistory.length;

      const now = performance.now();
      if (energy > avg * 1.18 && energy > 20 && now - lastBeatTime > 260) {
        lastBeatTime = now;
        triggerBeatFlash();
      }
    }

    function startBeatSync() {
      if (beatRAF || beatFallbackTimer) return;
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioCtx.createMediaElementSource(audio);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          freqData = new Uint8Array(analyser.frequencyBinCount);
          source.connect(analyser);
          analyser.connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        energyHistory = [];
        analyseBeatFrame();
      } catch (err) {
        // CORS or unsupported: fall back to a simulated ~120 BPM pulse
        beatFallbackTimer = setInterval(triggerBeatFlash, 500);
      }
    }

    function stopBeatSync() {
      if (beatRAF) { cancelAnimationFrame(beatRAF); beatRAF = null; }
      if (beatFallbackTimer) { clearInterval(beatFallbackTimer); beatFallbackTimer = null; }
    }

    let streamsCount = 48000 + Math.floor(Math.random() * 9000);
    streamsCountEl.textContent = streamsCount.toLocaleString();

    function bumpStreamsCount() {
      const increase = 15 + Math.floor(Math.random() * 60);
      streamsCount += increase;
      streamsCountEl.textContent = streamsCount.toLocaleString();
      streamsCountEl.classList.add('bump');
      setTimeout(() => streamsCountEl.classList.remove('bump'), 900);
    }

    setInterval(bumpStreamsCount, 60000);

    mobileViewBtn.addEventListener('click', () => {
      document.body.classList.remove('desktop-view');
      mobileViewBtn.classList.add('active');
      desktopViewBtn.classList.remove('active');
    });
    desktopViewBtn.addEventListener('click', () => {
      document.body.classList.add('desktop-view');
      desktopViewBtn.classList.add('active');
      mobileViewBtn.classList.remove('active');
    });

    const commentForm = document.getElementById('commentForm');
    const commentNote = document.getElementById('commentNote');
    commentForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('commentEmail').value.trim();
      const comment = document.getElementById('commentBox').value.trim();
      if (!email || !comment) return;
      commentNote.textContent = 'Thanks! Your comment has been noted.';
      commentNote.classList.add('success');
      commentForm.reset();
    });
    const coverImg2 = document.getElementById('coverImg2');

    function startCoverCycle() {
      // single static cover now; nothing to cycle
    }
    function stopCoverCycle() {
      // single static cover now; nothing to cycle
    }

    const PLAY_PATH = "M8 5v14l11-7z";
    const PAUSE_PATH = "M6 5h4v14H6zM14 5h4v14h-4z";

    audio.volume = volume.value;

    function setPlayingUI(isPlaying) {
      playIcon.querySelector('path')?.remove();
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", isPlaying ? PAUSE_PATH : PLAY_PATH);
      playIcon.appendChild(path);
      artwork.classList.toggle('playing', isPlaying);
      scrubFill.classList.toggle('live', isPlaying);
    }

    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
    });

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        playBtn.disabled = true;
        status.textContent = 'Connecting...';
        status.classList.remove('live');
        audio.play().then(() => {
          setPlayingUI(true);
          status.textContent = 'Live';
          status.classList.add('live');
          startCoverCycle();
          document.body.classList.add('party');
          startBeatSync();
          playBtn.disabled = false;
        }).catch(() => {
          status.textContent = 'Unable to connect to stream';
          playBtn.disabled = false;
        });
      } else {
        audio.pause();
        setPlayingUI(false);
        status.textContent = 'Paused';
        status.classList.remove('live');
        stopCoverCycle();
        document.body.classList.remove('party');
        stopBeatSync();
      }
    });

    volume.addEventListener('input', () => {
      audio.volume = volume.value;
    });

    audio.addEventListener('waiting', () => {
      status.textContent = 'Buffering...';
    });

    audio.addEventListener('error', () => {
      status.textContent = 'Stream error — please try again';
      setPlayingUI(false);
      playBtn.disabled = false;
      stopCoverCycle();
      document.body.classList.remove('party');
      stopBeatSync();
    });

    audio.addEventListener('stalled', () => {
      status.textContent = 'Connection stalled...';
    });
  </script>

</body>
</html>
